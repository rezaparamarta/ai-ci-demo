version: 2.1

jobs:
  run-tests:

    docker:
      - image: cimg/python:3.11

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            pip install -r requirements.txt

      - run:
          name: Run AI tests
          command: |
            pytest

workflows:
  version: 2

  test-workflow:
    jobs:
      - run-tests
